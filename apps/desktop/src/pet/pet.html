<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self';
      style-src 'self';
      img-src 'self' data:;
      connect-src 'self' http://localhost:8000 http://127.0.0.1:8000;
    "
  />
  <title>Dragon Pet AI - Pet Mode Skeleton</title>
  <link rel="stylesheet" href="pet.css" />
</head>
<body>
  <main
    id="pet-mode-root"
    class="pet-shell"
    data-mode="pet"
    data-bubble-state="collapsed"
    data-menu-state="closed"
    data-supported-bubble-states="collapsed expanded speaking thinking composing empty_input pending success backend_offline timeout llm_local_error fallback_mock long_reply"
    aria-label="Christina pet mode skeleton"
  >
    <div id="pet-drag-handle" class="pet-drag-handle" aria-label="Drag pet window" title="Drag"></div>

    <section id="pet-drag-region" class="pet-stage pet-no-drag" aria-label="Pet interaction region">
      <div id="pet-avatar-container" class="pet-avatar-container pet-no-drag" data-expression="neutral">
        <img
          id="pet-avatar"
          class="pet-avatar pet-no-drag"
          src="../renderer/assets/pet/christina/expressions/christina_neutral.png"
          alt="Christina neutral expression"
        />
      </div>

      <p id="pet-hint" class="pet-hint pet-no-drag" aria-live="polite">&#x54FC;&#xFF0C;&#x6C5D;&#x53EB;&#x543E;&#x51FA;&#x4F86;&#x505A;&#x4EC0;&#x9EBC;&#xFF1F;</p>
    </section>

    <section
      id="pet-bubble"
      class="pet-bubble pet-speech-bubble pet-no-drag"
      data-state="collapsed"
      aria-label="Christina speech bubble"
      aria-expanded="false"
      hidden
    >
      <div class="pet-bubble-header">
        <span id="pet-bubble-title" class="pet-sr-only">Christina Speech</span>
        <button id="pet-bubble-close-hook" class="pet-icon-button pet-no-drag" type="button" data-hook="bubble-close" aria-label="Collapse bubble">x</button>
      </div>
      <div id="pet-bubble-status" class="pet-bubble-status pet-no-drag" data-source="local">
        local placeholder
      </div>
      <div id="pet-bubble-message" class="pet-bubble-message pet-no-drag" aria-live="polite">
        打字請開 Full App。
      </div>
      <div id="pet-bubble-response" class="pet-bubble-response pet-no-drag" aria-live="polite">
        哼，汝要吾說話，就去 Full App 下令。
      </div>
      <div id="pet-bubble-placeholder" class="pet-bubble-body pet-no-drag">
        <p>Display-only speech bubble. Type in Full App.</p>
      </div>
      <form
        id="pet-chat-form-hook"
        class="pet-chat-form pet-dev-chat-form pet-no-drag"
        data-hook="chat-form"
        data-dev-only="true"
        aria-hidden="true"
        hidden
      >
        <input
          id="pet-chat-input-hook"
          class="pet-no-drag"
          type="text"
          placeholder="Dev-only hidden Pet chat input"
          autocomplete="off"
          tabindex="-1"
          hidden
        />
        <button id="pet-chat-send-hook" class="pet-no-drag" type="submit" tabindex="-1" hidden>Send</button>
      </form>
    </section>

    <nav id="pet-mode-actions" class="pet-mode-actions pet-no-drag" aria-label="Pet mode action hooks">
      <button id="pet-bubble-open-hook" class="pet-no-drag" type="button" data-hook="bubble-open">Chat</button>
      <button id="pet-open-full-app-hook" class="pet-no-drag" type="button" data-hook="open-full-app">Full App</button>
      <button id="pet-context-menu-hook" class="pet-no-drag" type="button" data-hook="context-menu">Menu</button>
    </nav>

    <section
      id="pet-menu"
      class="pet-menu pet-no-drag"
      data-state="closed"
      aria-label="Pet menu"
      aria-hidden="true"
      hidden
    >
      <button id="pet-menu-open-full-app" class="pet-menu-item pet-no-drag" type="button" data-menu-action="open-full-app">Open Full App</button>
      <button id="pet-menu-reset-position" class="pet-menu-item pet-no-drag" type="button" data-menu-action="reset-position">Reset Pet Position</button>
      <button id="pet-menu-hide-window" class="pet-menu-item pet-no-drag" type="button" data-menu-action="hide-window">Hide Pet Window</button>
      <button id="pet-menu-close" class="pet-menu-item pet-no-drag" type="button" data-menu-action="close-menu">Close Menu</button>
    </section>
  </main>

  <script src="pet-renderer.js"></script>
</body>
</html>
