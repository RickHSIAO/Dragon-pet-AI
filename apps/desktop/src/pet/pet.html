<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self';
      style-src 'self';
      img-src 'self' data:;
      connect-src 'self' http://localhost:8000 http://127.0.0.1:8000;
    "
  />
  <title>Dragon Pet AI - Pet Mode Skeleton</title>
  <link rel="stylesheet" href="pet.css" />
</head>
<body>
  <main
    id="pet-mode-root"
    class="pet-shell"
    data-mode="pet"
    data-bubble-state="collapsed"
    data-menu-state="closed"
    data-supported-bubble-states="collapsed idle_default expanded handoff speaking thinking composing empty_input pending success backend_offline timeout llm_local_error fallback_mock long_reply"
    aria-label="Christina pet mode skeleton"
  >
    <!-- TASK-166E click-fix2: CT recovery strip — full-width hover zone at top of window.
         Only shown when click-through is ON. Hovering forces CT OFF via pointerenter/mousemove
         even while setIgnoreMouseEvents(true, { forward: true }) is active. -->
    <div id="pet-ct-recovery-strip" class="pet-ct-recovery-strip" aria-hidden="true" hidden></div>
    <div id="pet-drag-handle" class="pet-drag-handle" aria-label="Drag pet window" title="Drag"></div>
    <div id="pet-stage-controls" class="pet-stage-controls pet-no-drag" aria-label="Pet speech controls">
      <span id="pet-bubble-title" class="pet-sr-only">Christina Speech</span>
      <button id="pet-bubble-close-hook" class="pet-icon-button pet-no-drag" type="button" data-hook="bubble-close" aria-label="Hide Pet Window" title="Hide Pet">x</button>
    </div>

    <section id="pet-drag-region" class="pet-stage pet-no-drag" aria-label="Pet interaction region">
      <div id="pet-avatar-container" class="pet-avatar-container pet-no-drag" data-expression="neutral">
        <img
          id="pet-avatar"
          class="pet-avatar pet-no-drag"
          src="../renderer/assets/pet/christina/expressions/christina_neutral.png"
          alt="Christina neutral expression"
        />
      </div>

      <section
        id="pet-bubble"
        class="pet-bubble pet-speech-bubble pet-no-drag"
        data-state="collapsed"
        aria-label="Christina speech bubble"
        aria-expanded="false"
        hidden
      >
        <div id="pet-bubble-response" class="pet-bubble-response pet-no-drag" aria-live="polite">
          &#x9EDE; Full App &#x6253;&#x5B57;&#xFF0C;&#x543E;&#x6703;&#x5728;&#x9019;&#x88E1;&#x56DE;&#x5634;&#x3002;
        </div>
        <div id="pet-bubble-details" class="pet-bubble-details pet-no-drag" aria-label="Speech details" hidden>
          <div id="pet-bubble-status" class="pet-bubble-status pet-no-drag" data-source="local">
            local
          </div>
          <div id="pet-bubble-message" class="pet-bubble-message pet-no-drag" aria-live="polite">
            &#x6253;&#x5B57;&#x8ACB;&#x958B; Full App&#x3002;
          </div>
        </div>
        <div id="pet-bubble-placeholder" class="pet-bubble-body pet-no-drag">
          <p>Display-only speech bubble. Type in Full App.</p>
        </div>
        <form
          id="pet-chat-form-hook"
          class="pet-chat-form pet-dev-chat-form pet-no-drag"
          data-hook="chat-form"
          data-dev-only="true"
          aria-hidden="true"
          hidden
        >
          <input
            id="pet-chat-input-hook"
            class="pet-no-drag"
            type="text"
            placeholder="Dev-only hidden Pet chat input"
            autocomplete="off"
            tabindex="-1"
            hidden
          />
          <button id="pet-chat-send-hook" class="pet-no-drag" type="submit" tabindex="-1" hidden>Send</button>
        </form>
      </section>

      <div
        id="pet-direct-input-panel"
        class="pet-direct-input-panel pet-no-drag"
        data-state="closed"
        aria-label="Pet chat input"
        hidden
      >
        <form id="pet-direct-input-form" class="pet-direct-input-form pet-no-drag" novalidate>
          <input
            id="pet-direct-input-field"
            class="pet-direct-input-field pet-no-drag"
            type="text"
            placeholder="&#x8A0A;&#x606F;&#x2026;"
            maxlength="500"
            autocomplete="off"
            aria-label="&#x8F38;&#x5165;&#x8A0A;&#x606F;&#x7D66; Christina"
          />
          <button id="pet-direct-input-send" class="pet-direct-input-send pet-no-drag" type="submit" aria-label="Send">&#x2191;</button>
          <button id="pet-direct-input-close" class="pet-direct-input-close pet-no-drag" type="button" aria-label="Close input">&#x2715;</button>
        </form>
      </div>

      <!-- TASK-167A: Recording indicator — shown only when data-recording="true" on #pet-mode-root -->
      <div
        id="pet-recording-indicator"
        class="pet-recording-indicator pet-no-drag"
        aria-live="assertive"
        aria-label="Recording status"
        hidden
      >
        <span id="pet-recording-dot" class="pet-recording-dot" aria-hidden="true"></span>
        <span id="pet-recording-status" class="pet-recording-status pet-no-drag">&#x9304;&#x97F3;&#x4E2D;&#x2026;</span>
        <button id="pet-recording-cancel" class="pet-recording-cancel pet-no-drag" type="button" aria-label="Cancel recording">&#x2715;</button>
      </div>

      <!-- TASK-167B: Transcribing indicator — shown only when data-transcribing="true" on #pet-mode-root -->
      <div
        id="pet-transcribing-indicator"
        class="pet-transcribing-indicator pet-no-drag"
        aria-live="polite"
        aria-label="Transcription status"
        hidden
      >
        <span id="pet-transcribing-spinner" class="pet-transcribing-spinner" aria-hidden="true"></span>
        <span id="pet-transcribing-status" class="pet-transcribing-status pet-no-drag">&#x8F49;&#x9304;&#x4E2D;&#x2026;</span>
      </div>

      <!-- TASK-168B: Speaking indicator — shown only when data-speaking="true" on #pet-mode-root -->
      <div
        id="pet-speaking-indicator"
        class="pet-speaking-indicator pet-no-drag"
        aria-live="polite"
        aria-label="Speaking status"
        hidden
      >
        <span class="pet-speaking-wave" aria-hidden="true">&#x266A;</span>
        <span id="pet-speaking-status" class="pet-speaking-status pet-no-drag">&#x56DE;&#x61C9;&#x4E2D;&#x2026;</span>
        <button id="pet-tts-stop" class="pet-tts-stop pet-no-drag" type="button" aria-label="Stop speech">&#x25A0;</button>
      </div>

      <p id="pet-hint" class="pet-hint pet-no-drag" aria-live="polite">&#x54FC;&#xFF0C;&#x6C5D;&#x53EB;&#x543E;&#x51FA;&#x4F86;&#x505A;&#x4EC0;&#x9EBC;&#xFF1F;</p>
    </section>

    <nav id="pet-mode-actions" class="pet-mode-actions pet-no-drag" aria-label="Pet mode action hooks">
      <button id="pet-bubble-open-hook" class="pet-no-drag" type="button" data-hook="bubble-open" aria-label="Open Pet chat input" title="Open Pet chat input">Chat</button>
      <button id="pet-open-full-app-hook" class="pet-no-drag" type="button" data-hook="open-full-app" aria-label="Open Full App" title="Open Full App">Full App</button>
      <!-- TASK-167A: Mic / Voice push-to-talk button -->
      <button id="pet-mic-hook" class="pet-no-drag" type="button" data-hook="mic" aria-label="Start voice recording" aria-pressed="false" title="Voice">&#x1F3A4;</button>
      <button id="pet-context-menu-hook" class="pet-no-drag" type="button" data-hook="context-menu" aria-label="Open Pet menu" title="Menu">Menu</button>
    </nav>

    <section
      id="pet-menu"
      class="pet-menu pet-no-drag"
      data-state="closed"
      aria-label="Pet menu"
      aria-hidden="true"
      hidden
    >
      <button id="pet-menu-toggle-details" class="pet-menu-item pet-no-drag" type="button" data-menu-action="toggle-details" aria-expanded="false">Toggle Details</button>
      <button id="pet-menu-reset-position" class="pet-menu-item pet-no-drag" type="button" data-menu-action="reset-position">Reset Pet Position</button>
      <button id="pet-menu-hide-window" class="pet-menu-item pet-no-drag" type="button" data-menu-action="hide-window">Hide Pet Window</button>
      <button id="pet-menu-quiet-mode" class="pet-menu-item pet-no-drag" type="button" data-menu-action="quiet-mode" aria-pressed="false">Quiet Mode: Off</button>
      <button id="pet-menu-click-through" class="pet-menu-item pet-no-drag" type="button" data-menu-action="click-through" aria-pressed="false">Click-through: Off</button>
      <button id="pet-menu-tts" class="pet-menu-item pet-no-drag" type="button" data-menu-action="tts" aria-pressed="false">&#x8A9E;&#x97F3;&#x64AD;&#x653E;: &#x95DC;</button>
      <div id="pet-menu-scale-group" class="pet-menu-scale-group pet-no-drag" role="group" aria-label="Window size">
        <button id="pet-menu-scale-small"  class="pet-menu-scale-btn pet-no-drag" type="button" data-scale="small"  aria-pressed="false">S</button>
        <button id="pet-menu-scale-medium" class="pet-menu-scale-btn pet-no-drag" type="button" data-scale="medium" aria-pressed="true">M</button>
        <button id="pet-menu-scale-large"  class="pet-menu-scale-btn pet-no-drag" type="button" data-scale="large"  aria-pressed="false">L</button>
      </div>
    </section>
  </main>

  <script src="pet-renderer.js"></script>
</body>
</html>
