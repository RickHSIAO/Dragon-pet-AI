<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      user-select: none;
    }
    header {
      padding: 14px 18px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    header .hint { font-size: 12px; opacity: 0.50; }
    #window-list {
      overflow-y: auto;
      height: calc(100vh - 49px);
      padding: 6px;
    }
    .window-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      gap: 10px;
    }
    .window-item:hover  { background: rgba(255,255,255,0.08); }
    .window-item:active { background: rgba(41,168,255,0.18); }
    .window-index {
      font-size: 11px;
      opacity: 0.35;
      min-width: 22px;
      text-align: right;
      flex-shrink: 0;
    }
    .window-name {
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #no-windows {
      display: none;
      text-align: center;
      margin-top: 80px;
      opacity: 0.50;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>選擇要擷取的視窗</h1>
    <span class="hint">Esc 取消</span>
  </header>
  <div id="window-list"></div>
  <div id="no-windows">找不到可截圖的視窗</div>
</body>
</html>
